<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khaled Habib — Graphic Designer</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  text-align: center;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
}

.nav-logo {
  height: 50px;
}

/* HERO */
#hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ABOUT */
#about {
  padding: 80px 20px;
}

.photo-frame {
  max-width: 300px;
  margin: auto;
}

.photo-frame img {
  width: 100%;
  border-radius: 12px;
}

/* FOOTER */
footer {
  padding: 20px;
  border-top: 1px solid #222;
}

.footer-logo {
  height: 40px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <img src="logo.png" alt="Logo" class="nav-logo">
  <a href="#about" style="color:white;">About</a>
</nav>

<!-- HERO -->
<section id="hero">
  <h1>Khaled Habib</h1>
</section>

<!-- ABOUT -->
<section id="about">
  <h2>About Me</h2>

  <div class="photo-frame">
    <img src="profile.png" alt="Khaled Habib">
  </div>

  <p>Graphic Designer | Branding | Social Media</p>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Khaled Habib</p>
  <img src="logo.png" class="footer-logo">
</footer>

</body>
</html>
